# pyproject.toml

[tool.coverage.run]
branch = true
source = ["src"]
omit = [
    "src/database/migrations/*",
]

[tool.coverage.report]
show_missing = true
skip_covered = false
fail_under = 90
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "if __name__ == ['\"]__main__['\"]:",
]

[tool.isort]
profile = "black"

[tool.mypy]
python_version = "3.12"
warn_unused_configs = true
ignore_missing_imports = false
plugins = []

[[tool.mypy.overrides]]
module = [
    "streamlit",
]
ignore_missing_imports = true

# pulse_bot is a research-grade codebase with extensive Optional types and
# defensive None checks that mypy can't always narrow. Disable error codes
# that fire on legitimate runtime-guarded patterns. Real type bugs (return
# type mismatches, missing args in declared signatures) still surface.
[[tool.mypy.overrides]]
module = ["pulse_bot.*"]
disable_error_code = [
    "union-attr",       # Optional access guarded by `if x is None: return`
    "arg-type",         # Optional defaults passed where non-None type narrows at runtime
    "assignment",       # SpawnContext vs ForkContext, callable-as-None pattern
    "attr-defined",     # str|dict union access guarded by isinstance
    "dict-item",        # str|None values in dicts that the runtime trims
    "func-returns-value",  # `return main()` from CLI wrappers
    "call-arg",         # legacy DB methods with optional args added later
]
