# pyproject.toml

[tool.coverage.run]
branch = true
source = ["src"]
omit = [
    "src/database/migrations/*",
]

[tool.coverage.report]
show_missing = true
skip_covered = false
fail_under = 90
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "if __name__ == ['\"]__main__['\"]:",
]

# yellowstone_proto/ is protoc-generated — excluded from black/isort/mypy
# (and ruff, via .ruff.toml). Generated code is never hand-edited or linted.
[tool.black]
extend-exclude = "pulse_bot/launchpads/yellowstone_proto/"

[tool.isort]
profile = "black"
extend_skip_glob = ["pulse_bot/launchpads/yellowstone_proto/*"]

[tool.mypy]
python_version = "3.12"
warn_unused_configs = true
ignore_missing_imports = false
plugins = []
exclude = ["pulse_bot/launchpads/yellowstone_proto/"]

[[tool.mypy.overrides]]
module = [
    "streamlit",
    "yaml",
]
ignore_missing_imports = true

# yellowstone_proto/ is protoc-generated. mypy still type-checks it when a
# hand-written module imports from it (exclude only stops directory walk),
# so silence errors originating in the generated package outright.
[[tool.mypy.overrides]]
module = ["pulse_bot.launchpads.yellowstone_proto.*"]
ignore_errors = true

# pulse_bot is a research-grade codebase with extensive Optional types and
# defensive None checks that mypy can't always narrow. Disable error codes
# that fire on legitimate runtime-guarded patterns. Real type bugs (return
# type mismatches, missing args in declared signatures) still surface.
[[tool.mypy.overrides]]
module = ["pulse_bot.*"]
disable_error_code = [
    "union-attr",       # Optional access guarded by `if x is None: return`
    "arg-type",         # Optional defaults passed where non-None type narrows at runtime
    "assignment",       # SpawnContext vs ForkContext, callable-as-None pattern
    "attr-defined",     # str|dict union access guarded by isinstance
    "dict-item",        # str|None values in dicts that the runtime trims
    "func-returns-value",  # `return main()` from CLI wrappers
    "call-arg",         # legacy DB methods with optional args added later
]
